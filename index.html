<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>乾</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
/* ============================================================
   CSS Variables - Theme System
   ============================================================ */
:root {
  /* Light Theme (Default - Apple Inspired) */
  --bg-primary: #f5f5f7;
  --bg-card: #ffffff;
  --bg-card-hover: #fafafa;
  --text-primary: #1d1d1f;
  --text-secondary: #6e6e73;
  --text-tertiary: #999;
  --accent: #0071e3;
  --accent-hover: #0077ed;
  --accent-light: rgba(0,113,227,0.08);
  --border: rgba(0,0,0,0.08);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.1);
  --tag-bg: #f0f0f2;
  --tag-text: #6e6e73;
  --divider: rgba(0,0,0,0.06);
  --button-bg: #f0f0f2;
  --button-text: #1d1d1f;
  --button-hover: #e5e5e7;
  --input-bg: #f5f5f7;
  --dot-inactive: rgba(0,0,0,0.15);
  --glass: rgba(255,255,255,0.72);
  --glass-border: rgba(0,0,0,0.06);
  --product-grad-1: linear-gradient(135deg, #6366f1, #8b5cf6);
  --product-grad-2: linear-gradient(135deg, #ec4899, #f43f5e);
  --product-grad-3: linear-gradient(135deg, #06b6d4, #3b82f6);
}

[data-theme="dark"] {
  --bg-primary: #000000;
  --bg-card: #1c1c1e;
  --bg-card-hover: #2c2c2e;
  --text-primary: #f5f5f7;
  --text-secondary: #a1a1a6;
  --text-tertiary: #6e6e73;
  --accent: #2997ff;
  --accent-hover: #40a4ff;
  --accent-light: rgba(41,151,255,0.12);
  --border: rgba(255,255,255,0.1);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.4);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.5);
  --tag-bg: #2c2c2e;
  --tag-text: #a1a1a6;
  --divider: rgba(255,255,255,0.08);
  --button-bg: #2c2c2e;
  --button-text: #f5f5f7;
  --button-hover: #3a3a3c;
  --input-bg: #2c2c2e;
  --dot-inactive: rgba(255,255,255,0.2);
  --glass: rgba(28,28,30,0.72);
  --glass-border: rgba(255,255,255,0.08);
  --product-grad-1: linear-gradient(135deg, #4f46e5, #7c3aed);
  --product-grad-2: linear-gradient(135deg, #db2777, #e11d48);
  --product-grad-3: linear-gradient(135deg, #0891b2, #2563eb);
}

[data-theme="cyberpunk"] {
  --bg-primary: #0a0a1a;
  --bg-card: #12122a;
  --bg-card-hover: #1a1a3e;
  --text-primary: #e8e8ff;
  --text-secondary: #a0a0cc;
  --text-tertiary: #6a6a99;
  --accent: #a855f7;
  --accent-hover: #c084fc;
  --accent-light: rgba(168,85,247,0.12);
  --border: rgba(168,85,247,0.15);
  --shadow-sm: 0 1px 3px rgba(168,85,247,0.08);
  --shadow-md: 0 4px 20px rgba(168,85,247,0.12);
  --shadow-lg: 0 20px 60px rgba(168,85,247,0.15);
  --tag-bg: #1a1a3e;
  --tag-text: #a0a0cc;
  --divider: rgba(168,85,247,0.12);
  --button-bg: #1a1a3e;
  --button-text: #e8e8ff;
  --button-hover: #23235a;
  --input-bg: #1a1a3e;
  --dot-inactive: rgba(168,85,247,0.25);
  --glass: rgba(18,18,42,0.72);
  --glass-border: rgba(168,85,247,0.12);
  --product-grad-1: linear-gradient(135deg, #a855f7, #6366f1);
  --product-grad-2: linear-gradient(135deg, #f43f5e, #ec4899);
  --product-grad-3: linear-gradient(135deg, #06b6d4, #22d3ee);
}

[data-theme="nature"] {
  --bg-primary: #f8faf5;
  --bg-card: #ffffff;
  --bg-card-hover: #f4f9f2;
  --text-primary: #1a2e1a;
  --text-secondary: #5a7a5a;
  --text-tertiary: #8aaa8a;
  --accent: #2d8a4e;
  --accent-hover: #36a05a;
  --accent-light: rgba(45,138,78,0.08);
  --border: rgba(45,138,78,0.1);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.07);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.09);
  --tag-bg: #eaf5e8;
  --tag-text: #4a7a4a;
  --divider: rgba(45,138,78,0.08);
  --button-bg: #eaf5e8;
  --button-text: #1a2e1a;
  --button-hover: #d8eed5;
  --input-bg: #f5faf2;
  --dot-inactive: rgba(45,138,78,0.2);
  --glass: rgba(255,255,255,0.72);
  --glass-border: rgba(45,138,78,0.08);
  --product-grad-1: linear-gradient(135deg, #059669, #10b981);
  --product-grad-2: linear-gradient(135deg, #65a30d, #84cc16);
  --product-grad-3: linear-gradient(135deg, #0d9488, #14b8a6);
}

/* ============================================================
   Base & Reset
   ============================================================ */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
               "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  transition: background 0.5s cubic-bezier(0.25, 0.1, 0.25, 1),
              color 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
  line-height: 1.6;
}

/* ============================================================
   Main Card Container
   ============================================================ */
.card-wrapper {
  width: 100%;
  max-width: 720px;
  perspective: 1000px;
}

.card {
  background: var(--bg-card);
  border-radius: 24px;
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border);
  padding: 48px 44px;
  position: relative;
  overflow: hidden;
  transition: background 0.5s cubic-bezier(0.25, 0.1, 0.25, 1),
              border-color 0.5s cubic-bezier(0.25, 0.1, 0.25, 1),
              box-shadow 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
}

.card::before {
  content: '';
  position: absolute;
  top: -120px;
  right: -120px;
  width: 300px;
  height: 300px;
  background: var(--accent-light);
  border-radius: 50%;
  pointer-events: none;
  transition: background 0.5s ease;
}

.card::after {
  content: '';
  position: absolute;
  bottom: -80px;
  left: -80px;
  width: 200px;
  height: 200px;
  background: var(--accent-light);
  border-radius: 50%;
  pointer-events: none;
  opacity: 0.5;
  transition: background 0.5s ease;
}

/* ============================================================
   Header Section
   ============================================================ */
.card-header {
  display: flex;
  align-items: center;
  gap: 36px;
  position: relative;
  z-index: 1;
  margin-bottom: 36px;
}

.avatar-container {
  flex-shrink: 0;
  position: relative;
}

.avatar {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid var(--border);
  box-shadow: var(--shadow-md);
  transition: border-color 0.5s ease, box-shadow 0.5s ease;
  display: block;
  background: #6366f1;
}

.avatar-ring {
  position: absolute;
  inset: -5px;
  border-radius: 50%;
  border: 2px solid var(--accent);
  opacity: 0.3;
  animation: avatarPulse 3s ease-in-out infinite;
}

@keyframes avatarPulse {
  0%, 100% { transform: scale(1); opacity: 0.3; }
  50% { transform: scale(1.04); opacity: 0.15; }
}

.header-info {
  flex: 1;
  min-width: 0;
}

.name {
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text-primary);
  transition: color 0.5s ease;
  line-height: 1.2;
}

.title {
  font-size: 1rem;
  font-weight: 500;
  color: var(--accent);
  margin-top: 6px;
  transition: color 0.5s ease;
  letter-spacing: -0.01em;
}

.title-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
}

.tag {
  display: inline-block;
  padding: 4px 12px;
  background: var(--tag-bg);
  color: var(--tag-text);
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 500;
  transition: background 0.5s ease, color 0.5s ease;
}

/* ============================================================
   Divider
   ============================================================ */
.divider {
  height: 1px;
  background: var(--divider);
  margin: 0 0 36px 0;
  position: relative;
  z-index: 1;
  transition: background 0.5s ease;
}

/* ============================================================
   Bio Section
   ============================================================ */
.bio-section {
  position: relative;
  z-index: 1;
  margin-bottom: 36px;
}

.bio-label {
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 10px;
  transition: color 0.5s ease;
}

.bio-text {
  font-size: 1.05rem;
  line-height: 1.8;
  color: var(--text-secondary);
  transition: color 0.5s ease;
  letter-spacing: -0.01em;
}

/* ============================================================
   Contact Section
   ============================================================ */
.contact-section {
  position: relative;
  z-index: 1;
  margin-bottom: 36px;
}

.contact-label {
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 14px;
  transition: color 0.5s ease;
}

.contact-links {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.contact-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  background: var(--button-bg);
  color: var(--button-text);
  text-decoration: none;
  border-radius: 12px;
  font-size: 0.9rem;
  font-weight: 500;
  transition: all 0.25s ease;
  border: 1px solid transparent;
}

.contact-link:hover {
  background: var(--button-hover);
  border-color: var(--accent);
  transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
}

/* ============================================================
   Modal
   ============================================================ */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}

.modal-overlay.active {
  display: flex;
}

.modal-box {
  background: var(--bg-card);
  border-radius: 20px;
  padding: 32px;
  max-width: 360px;
  width: 90%;
  text-align: center;
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border);
  animation: fadeInUp 0.3s ease-out;
}

.modal-box img {
  width: 100%;
  border-radius: 12px;
  margin-bottom: 16px;
}

.modal-box .modal-title {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 4px;
}

.modal-box .modal-subtitle {
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin-bottom: 16px;
}

.modal-close {
  padding: 8px 28px;
  border-radius: 10px;
  border: none;
  background: var(--accent);
  color: #fff;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
}

.modal-close:hover {
  background: var(--accent-hover);
  transform: scale(1.02);
}

.contact-link svg {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
}

/* ============================================================
   Products Section
   ============================================================ */
.products-section {
  position: relative;
  z-index: 1;
}

.products-label {
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 14px;
  transition: color 0.5s ease;
}

.product-list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px;
}

.product-item {
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 0.88rem;
  font-weight: 600;
  color: #ffffff;
  transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
  cursor: default;
  display: flex;
  align-items: center;
  gap: 8px;
  text-shadow: 0 1px 2px rgba(0,0,0,0.15);
  position: relative;
  overflow: hidden;
}

.product-item::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 12px;
  background: rgba(255,255,255,0);
  transition: background 0.3s ease;
  pointer-events: none;
}

.product-item:nth-child(1) { background: var(--product-grad-1); }
.product-item:nth-child(2) { background: var(--product-grad-2); }
.product-item:nth-child(3) { background: var(--product-grad-3); }

.product-item:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.18);
}

.product-item:hover::after {
  background: rgba(255,255,255,0.12);
}

.product-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.7);
  flex-shrink: 0;
  box-shadow: 0 0 6px rgba(255,255,255,0.4);
}

/* ============================================================
   Theme Switcher
   ============================================================ */
.theme-switcher {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top: 40px;
  position: relative;
  z-index: 1;
}

.theme-dot {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.theme-dot:hover {
  transform: scale(1.15);
}

.theme-dot.active {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px var(--accent-light);
}

.theme-dot::after {
  content: '';
  position: absolute;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  opacity: 0;
  transition: opacity 0.3s ease;
}

.theme-dot.active::after {
  opacity: 1;
}

.theme-dot-light { background: linear-gradient(135deg, #f5f5f7, #e5e5e7); }
.theme-dot-dark { background: linear-gradient(135deg, #1c1c1e, #2c2c2e); }
.theme-dot-cyberpunk { background: linear-gradient(135deg, #0a0a1a, #a855f7); }
.theme-dot-nature { background: linear-gradient(135deg, #2d8a4e, #4ade80); }

.theme-label {
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--text-tertiary);
  margin-left: 8px;
  transition: color 0.5s ease;
  min-width: 50px;
}

/* ============================================================
   Responsive - Tablet
   ============================================================ */
@media (max-width: 640px) {
  body {
    padding: 16px;
    align-items: flex-start;
    padding-top: 30px;
  }

  .card {
    padding: 32px 24px;
    border-radius: 20px;
  }

  .card-header {
    flex-direction: column;
    text-align: center;
    gap: 24px;
    margin-bottom: 28px;
  }

  .avatar {
    width: 130px;
    height: 130px;
  }

  .name {
    font-size: 1.6rem;
  }

  .title-tags {
    justify-content: center;
  }

  .bio-text {
    font-size: 0.95rem;
    text-align: center;
  }

  .bio-label, .contact-label, .products-label {
    text-align: center;
  }

  .contact-links {
    justify-content: center;
  }

  .product-list {
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  }

  .theme-switcher {
    margin-top: 32px;
  }
}

@media (max-width: 400px) {
  .card {
    padding: 24px 16px;
  }

  .name {
    font-size: 1.4rem;
  }

  .contact-link {
    padding: 8px 14px;
    font-size: 0.82rem;
  }

  .product-list {
    grid-template-columns: 1fr 1fr;
  }
}

/* ============================================================
   Animation
   ============================================================ */
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.card-header { animation: fadeInUp 0.6s ease-out; }
.bio-section { animation: fadeInUp 0.6s ease-out 0.1s both; }
.contact-section { animation: fadeInUp 0.6s ease-out 0.2s both; }
.products-section { animation: fadeInUp 0.6s ease-out 0.3s both; }
.theme-switcher { animation: fadeInUp 0.6s ease-out 0.4s both; }

/* ============================================================
   Chat Widget
   ============================================================ */
.chat-bubble-btn {
  position: fixed; bottom: 28px; right: 28px;
  width: 60px; height: 60px; border-radius: 50%;
  background: #4f46e5; color: #fff; border: none;
  cursor: pointer; box-shadow: 0 4px 24px rgba(0,0,0,0.12);
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.25s, box-shadow 0.25s;
  z-index: 9998; font-size: 26px;
}
.chat-bubble-btn:hover { transform: scale(1.08); box-shadow: 0 6px 30px rgba(79,70,229,0.35); }
.chat-bubble-btn .badge {
  position: absolute; top: -2px; right: -2px;
  width: 20px; height: 20px; border-radius: 50%;
  background: #ef4444; color: #fff; font-size: 11px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; display: none;
}
.chat-bubble-btn .bubble-icon { transition: transform 0.3s; }
.chat-bubble-btn.open .bubble-icon { transform: rotate(180deg); }

.chat-window {
  position: fixed; bottom: 100px; right: 28px;
  width: 380px; height: 560px;
  background: #fff; border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.12);
  display: flex; flex-direction: column;
  overflow: hidden; z-index: 9999;
  transform: translateY(20px) scale(0.95);
  opacity: 0; pointer-events: none;
  transition: transform 0.3s, opacity 0.3s;
}
.chat-window.active {
  transform: translateY(0) scale(1);
  opacity: 1; pointer-events: all;
}

.chat-header {
  background: #4f46e5; color: #fff;
  padding: 16px 20px; display: flex; align-items: center;
  justify-content: space-between;
}
.chat-header .header-info { display: flex; align-items: center; gap: 12px; }
.chat-header .avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(255,255,255,0.2); display: flex;
  align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700;
}
.chat-header .agent-name { font-weight: 600; font-size: 15px; }
.chat-header .agent-status { font-size: 12px; opacity: 0.85; }
.chat-header .online-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #22c55e; display: inline-block; margin-right: 4px;
  animation: chatPulse 2s infinite;
}
@keyframes chatPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.chat-header .close-btn {
  background: none; border: none; color: #fff;
  cursor: pointer; font-size: 20px; padding: 4px 8px;
  border-radius: 6px; transition: background 0.2s;
}
.chat-header .close-btn:hover { background: rgba(255,255,255,0.15); }

.chat-messages {
  flex: 1; padding: 16px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 8px;
  background: #f9fafb;
}
.chat-messages::-webkit-scrollbar { width: 5px; }
.chat-messages::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }

.message { max-width: 80%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.55; word-break: break-word; }
.message.agent { align-self: flex-start; background: #fff; color: #111827; box-shadow: 0 1px 2px rgba(0,0,0,0.05); border-bottom-left-radius: 4px; }
.message.user { align-self: flex-end; background: #4f46e5; color: #fff; border-bottom-right-radius: 4px; }
.message .time { font-size: 10px; opacity: 0.5; margin-top: 4px; text-align: right; }
.message.system { align-self: center; background: #f3f4f6; color: #6b7280; font-size: 12px; padding: 6px 12px; border-radius: 20px; max-width: 90%; }

.typing-indicator {
  align-self: flex-start; background: #fff; padding: 10px 14px;
  border-radius: 14px; border-bottom-left-radius: 4px;
  display: flex; gap: 4px; align-items: center;
  box-shadow: 0 1px 2px rgba(0,0,0,0.05);
}
.typing-indicator span {
  width: 7px; height: 7px; border-radius: 50%;
  background: #9ca3af; animation: typingBounce 1.4s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
}

.chat-input-area {
  padding: 12px 16px; border-top: 1px solid #e5e7eb;
  display: flex; gap: 8px; background: #fff;
}
.chat-input-area input {
  flex: 1; padding: 10px 14px; border: 1px solid #e5e7eb;
  border-radius: 24px; font-size: 14px; outline: none;
  transition: border-color 0.2s;
}
.chat-input-area input:focus { border-color: #4f46e5; }
.chat-input-area button {
  width: 40px; height: 40px; border-radius: 50%;
  background: #4f46e5; color: #fff; border: none;
  cursor: pointer; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, transform 0.15s;
  flex-shrink: 0;
}
.chat-input-area button:hover { background: #4338ca; }
.chat-input-area button:active { transform: scale(0.92); }

@media (max-width: 480px) {
  .chat-window {
    width: 100vw; height: 100vh; bottom: 0; right: 0;
    border-radius: 0;
  }
  .chat-bubble-btn { bottom: 20px; right: 20px; }
}

<script>
/* ============================================================
   Wechat Modal
   ============================================================ */
function openModal(imgSrc, title, subtitle) {
  const modal = document.getElementById('wechatModal');
  modal.querySelector('img').src = imgSrc;
  modal.querySelector('.modal-title').textContent = title;
  modal.querySelector('.modal-subtitle').textContent = subtitle;
  modal.classList.add('active');
}
function closeWechatModal(e) {
  if (e && e.target !== document.getElementById('wechatModal')) return;
  document.getElementById('wechatModal').classList.remove('active');
}

/* ============================================================
   Theme Switcher Logic
   ============================================================ */
(function() {
  const themeNames = {
    light: '浅色',
    dark: '深色',
    cyberpunk: '赛博朋克',
    nature: '自然'
  };

  const html = document.documentElement;
  const dots = document.querySelectorAll('.theme-dot');
  const label = document.querySelector('.theme-label');

  // Load saved theme
  const saved = localStorage.getItem('card-website-theme') || 'light';
  html.setAttribute('data-theme', saved);
  updateActiveDot(saved);

  dots.forEach(dot => {
    dot.addEventListener('click', function() {
      const theme = this.dataset.theme;
      html.setAttribute('data-theme', theme);
      localStorage.setItem('card-website-theme', theme);
      updateActiveDot(theme);
    });
  });

  function updateActiveDot(theme) {
    dots.forEach(d => d.classList.remove('active'));
    const active = document.querySelector(`[data-theme="${theme}"]`);
    if (active) {
      active.classList.add('active');
    }
    if (label) {
      label.textContent = themeNames[theme] || theme;
    }
  }
})();
</script>

<script>
(function() {
  var SUPABASE_URL = 'https://gurcvmrqzzgjxjqahwux.supabase.co';
  var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd1cmN2bXJxenpnanhqcWFod3V4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNDMwMDQsImV4cCI6MjA5NjgxOTAwNH0.HDRwOuykz3LBwUdJE5CZ8WbMTgmq8js_HA61HEFM2Bg';
  var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  var visitorId;
  try {
    visitorId = localStorage.getItem('chat_visitor_id');
  } catch(e) { visitorId = null; }
  if (!visitorId) {
    visitorId = 'v_' + Math.random().toString(36).slice(2, 10) + '_' + Date.now().toString(36);
    try { localStorage.setItem('chat_visitor_id', visitorId); } catch(e) {}
  }
  console.log('Visitor ID:', visitorId);
  var visitorName = '访客' + visitorId.slice(2, 6);

  var isChatOpen = false;
  var bubbleBtn = document.getElementById('bubbleBtn');
  var chatWindow = document.getElementById('chatWindow');
  var closeBtn = document.getElementById('closeBtn');
  var messagesContainer = document.getElementById('messagesContainer');
  var typingIndicator = document.getElementById('typingIndicator');
  var messageInput = document.getElementById('messageInput');
  var sendBtn = document.getElementById('sendBtn');
  var unreadBadge = document.getElementById('unreadBadge');
  var unreadCount = 0;

  function formatTime() {
    var d = new Date();
    return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  }

  function formatTimeFromISO(isoStr) {
    if (!isoStr) return formatTime();
    var d = new Date(isoStr);
    return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  }

  function addMessage(text, role, time) {
    var div = document.createElement('div');
    var displayRole = (role === 'visitor') ? 'user' : 'agent';
    div.className = 'message ' + displayRole;
    var label = (role === 'visitor') ? visitorName : '客服';
    div.innerHTML = '<div class="sender-label">' + label + '</div>' + text + '<div class="time">' + time + '</div>';
    messagesContainer.appendChild(div);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
    return div;
  }

  function addSystemMessage(text) {
    var div = document.createElement('div');
    div.className = 'message system';
    div.textContent = text;
    messagesContainer.appendChild(div);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
  }

  function updateUnread() {
    if (!isChatOpen) {
      unreadCount++;
      unreadBadge.style.display = 'flex';
      unreadBadge.textContent = unreadCount > 99 ? '99+' : unreadCount;
    }
  }

  function clearUnread() {
    unreadCount = 0;
    unreadBadge.style.display = 'none';
    unreadBadge.textContent = '0';
  }

  async function loadHistory() {
    try {
      var { data, error } = await supabase
        .from('messages')
        .select('*')
        .order('created_at', { ascending: true });
      if (error) { console.error('Load history error:', error); return; }
      if (!data || !data.length) { console.log('loadHistory: no messages in DB'); return; }
      messagesContainer.innerHTML = '';
      var count = 0;
      data.forEach(function(msg) {
        if (msg.role === 'visitor' && msg.sender !== visitorId) return;
        if (msg.role === 'agent' && (!msg.recipient || msg.recipient !== visitorId)) return;
        addMessage(msg.content, msg.role, formatTimeFromISO(msg.created_at));
        count++;
      });
      console.log('loadHistory: loaded ' + count + '/' + data.length + ' messages for ' + visitorId);
    } catch(e) {
      console.error('loadHistory exception:', e);
    }
  }

  async function sendMessage() {
    var text = messageInput.value.trim();
    if (!text) return;
    var msgEl = addMessage(text, 'visitor', formatTime());
    messageInput.value = '';
    var { error } = await supabase.from('messages').insert({
      content: text,
      sender: visitorId,
      role: 'visitor'
    });
    if (error) {
      console.error('Send error:', error);
      msgEl.style.opacity = '0.5';
      msgEl.title = '发送失败：' + (error.message || '未知错误');
    }
  }

  messageInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); sendMessage(); }
  });
  sendBtn.addEventListener('click', sendMessage);

  bubbleBtn.addEventListener('click', function() {
    isChatOpen = !isChatOpen;
    chatWindow.classList.toggle('active', isChatOpen);
    bubbleBtn.classList.toggle('open', isChatOpen);
    if (isChatOpen) clearUnread();
  });

  closeBtn.addEventListener('click', function() {
    isChatOpen = false;
    chatWindow.classList.remove('active');
    bubbleBtn.classList.remove('open');
  });

  // Subscribe to realtime
  supabase
    .channel('messages')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' },
      function(payload) {
        var msg = payload.new;
        if (msg.role === 'visitor') return;
        if (!msg.recipient || msg.recipient !== visitorId) return;
        addMessage(msg.content, msg.role, formatTimeFromISO(msg.created_at));
        if (!isChatOpen && msg.role === 'agent') updateUnread();
      }
    )
    .subscribe(function(status) {
      if (status === 'SUBSCRIBED') {
        loadHistory();
      }
    });
})();
</script>
